name: 🤖 CI

on:
  push:
    branches-ignore:
      - 'release-please--**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  format:
    name: 🔤 Oxfmt
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: '.nvmrc'

      - name: 📥 Install deps
        run: pnpm install

      - name: 💅 Format check
        run: pnpm run format:check

  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: '.nvmrc'

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔬 Lint
        run: pnpm run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: '.nvmrc'

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔎 Type check
        run: pnpm run typecheck

  playwright:
    name: 🎭 Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: '.nvmrc'

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔢 Get Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(pnpm exec playwright --version | tr ' ' '-')" >> $GITHUB_ENV

      - name: 📦 Cache Playwright binaries
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: 📥 Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: 🗃️ Setup test database
        run: |
          mkdir -p data
          pnpm exec dotenv -e .env.test -- pnpm db:migrate

      - name: 🎭 Playwright tests
        run: pnpm test:e2e

      - name: 📊 Upload report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright/report/
          retention-days: 30

  build:
    name: 👷‍♂️ Build
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: '.nvmrc'

      - name: 📥 Install deps
        run: pnpm install

      - name: 🛠 Build
        run: pnpm run build

  release:
    name: 🆕 Release
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck, playwright, build]
    if: ${{ github.ref == 'refs/heads/main' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: 🆕 Release Please
        id: release
        uses: googleapis/release-please-action@v4

  deploy-dev:
    name: 🚀 Deploy Dev
    runs-on: ubuntu-latest
    needs: [release]
    # deploy to dev on push to main, skip when release-please creates a release
    if: github.ref == 'refs/heads/main' && needs.release.outputs.release_created != 'true'
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 👀 Read app name
        uses: SebRollen/toml-action@v1.2.0
        id: app_name
        with:
          file: fly.toml
          field: app

      - name: 🚀 Deploy
        uses: superfly/flyctl-actions@1.5
        with:
          args: deploy --remote-only --build-arg COMMIT_SHA=${{ github.sha }} --build-arg DEPLOYMENT_ENV=dev --app ${{ steps.app_name.outputs.value }}-dev
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-prod:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: [release]
    if: ${{ needs.release.outputs.release_created == 'true' }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 👀 Read app name
        uses: SebRollen/toml-action@v1.2.0
        id: app_name
        with:
          file: fly.toml
          field: app

      - name: 🚀 Deploy
        uses: superfly/flyctl-actions@1.5
        with:
          args: deploy --remote-only --build-arg COMMIT_SHA=${{ github.sha }} --build-arg DEPLOYMENT_ENV=prod --app ${{ steps.app_name.outputs.value }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 🚫 Purge CDN Cache
        run: |
          curl -i -X POST https://api.fastly.com/service/${{ secrets.FASTLY_SERVICE_ID }}/purge \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "Fastly-Key: ${{ secrets.FASTLY_PURGE_API_KEY }}" \
            -H "Fastly-Soft-Purge: 1" \
            -H "Surrogate-Key: all"
